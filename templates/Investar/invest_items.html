    function set_page_link(curr_page, tot_page) {
      var pagesDiv = $('#pages');
      pagesDiv.empty();

      if (curr_page === 1) {
        start_p = 1;
        end_p = 3;
      } else {
        if (curr_page + 1 > tot_page) {
          start_p = tot_page - 2
          end_p = tot_page;
        } else {
          start_p = curr_page - 1
          end_p = curr_page + 1;
        }
      }

      pagesDiv.append('<a href="#">' + '맨앞' + </a>);
      var pageLink = $('<a href="#">').addClass('page-link').text(i);
      for (var i = start_p;i <= end_p; i++)
      {
        var pageLink = $('<a href="#">').addClass('page-link').text(i);
        if (i === curr_page) {
          pageLink.addClass('active-page');
        }
        pageLink.click(function() {
          goToPage(this);
        });
        pagesDiv.append(pageLink);
      }
      pagesDiv.append('<a href="#">' + '맨뒤' + </a>);
    }

    function goToPage(link) {
      var pageNumber = $(link).text()
      if (pageNumber=='맨앞') {
        pg_no = 0
      } else if (pageNumber=='맨뒤') {
        pg_no = 999
      } else {
        pg_no = parseInt($(link).text());
      }
      displayPage(pg_no);
    }

    function displayPage(pageNumber) {
      var leftList = $('#leftList');
      var rightList = $('#rightList');

      // Clear the left and right lists
      leftList.empty();
      rightList.empty();

      // Retrieve the items for the specified page from the database
      $.ajax({
        url: "{% url 'investar:get_paged_item' %}", // Replace with the path to your server-side script
        type: 'GET',
        data: { limit: 20, offset: (pageNumber - 1) * 20 }, // Specify the limit and offset for retrieving items
        success: function(data) {
          // Display the items in the left list
          data.forEach(function(item) {
            var listItem = $('<li>').addClass('list-item').text(item.company + '( ' + item.code + ' )');
            listItem.click(function() {
              selectItem(this);
            });
            leftList.append(listItem);
          });

          // Update the active page link
          $('.active-page').removeClass('active-page');
          $('.page-link').eq(pageNumber - 1).addClass('active-page');
        }
      });
    }

    function selectItem(item) {
      var text = $(item).text();
      var rightList = $('#rightList');
      var newListItem = $('<li>').text(text);
      rightList.append(newListItem);
    }
  </script>
